<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Reset Password - Admin</title>
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
    <meta http-equiv="Pragma" content="no-cache" />
    <meta http-equiv="Expires" content="0" />
    
    <!-- 1. CRITICAL: This pulls in the Supabase library so createClient works -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
    />
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      }
      .admin-bg { background: #fafafa; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
      .admin-login-wrapper { width: 100%; max-width: 400px; padding: 20px; }
      .admin-card { background: #fff; padding: 45px 35px; border-radius: 16px; box-shadow: 0 4px 24px rgba(0, 0, 0, 0.04); border: 1px solid #f0f0f0; }
      .admin-brand { text-align: center; margin-bottom: 35px; }
      .admin-brand h1 { font-size: 1.4rem; font-weight: 700; color: #111; margin-bottom: 6px; letter-spacing: -0.5px; }
      .admin-brand p { font-size: 0.9rem; color: #888; }
      .form-group { margin-bottom: 20px; }
      .form-group label { display: block; font-size: 0.85rem; font-weight: 500; color: #444; margin-bottom: 8px; }
      .input-with-icon { position: relative; }
      .input-with-icon i { position: absolute; left: 15px; top: 50%; transform: translateY(-50%); color: #999; font-size: 0.9rem; }
      .input-with-icon input { width: 100%; padding: 14px 14px 14px 42px; background: #f9f9f9; border: 1px solid #eee; border-radius: 8px; font-size: 0.95rem; color: #111; transition: all 0.2s; outline: none; }
      .input-with-icon input:focus { background: #fff; border-color: #ccc; box-shadow: 0 0 0 4px rgba(0, 0, 0, 0.03); }
      .error-message { color: #ef4444; font-size: 0.85rem; text-align: center; margin-bottom: 15px; min-height: 20px; display: none; }
      .success-message { color: #22c55e; font-size: 0.85rem; text-align: center; margin-bottom: 15px; min-height: 20px; display: none; }
      .admin-btn { width: 100%; padding: 14px; background: #000; color: #fff; border: none; border-radius: 8px; font-size: 0.95rem; font-weight: 600; cursor: pointer; transition: all 0.2s; display: flex; justify-content: center; align-items: center; gap: 8px; margin-top: 10px; }
      .admin-btn:hover { background: #333; transform: translateY(-1px); }
      .admin-btn:disabled { background: #e0e0e0; color: #888; cursor: not-allowed; transform: none; }
      .back-link { text-align: center; margin-top: 20px; font-size: 0.85rem; }
      .back-link a { color: #888; text-decoration: none; }
      .back-link a:hover { color: #111; }
    </style>
  </head>
  <body class="admin-bg">
    <div class="admin-login-wrapper">
      <div class="admin-card">
        <div class="admin-brand">
          <img src="/portal/Abacus.png" alt="Abacus Olympic Association" style="width: 70px; height: 70px; object-fit: contain; margin-bottom: 15px;" />
          <h1 id="pageTitle">Reset Password</h1>
          <p id="pageSubtitle">Enter your admin email</p>
        </div>

        <!-- 2. FIX: Wrapped in a <form> tag, removed onclick from button -->
        <form id="requestForm" onsubmit="event.preventDefault(); sendResetEmail();">
          <div class="form-group">
            <label for="resetEmail">Email Address</label>
            <div class="input-with-icon">
              <i class="fa-solid fa-envelope"></i>
              <input type="email" id="resetEmail" placeholder="admin@domain.com" required />
            </div>
          </div>
          <div id="requestError" class="error-message"></div>
          <div id="requestSuccess" class="success-message"></div>
          <button type="submit" class="admin-btn" id="requestBtn">
            Send Reset Link <i class="fa-solid fa-paper-plane"></i>
          </button>
        </form>

        <!-- 3. FIX: Wrapped in a <form> tag to resolve the DOM warnings -->
        <form id="updateForm" style="display: none" onsubmit="event.preventDefault(); updatePassword();">
          <div class="form-group">
            <label for="newPassword">New Password</label>
            <div class="input-with-icon">
              <i class="fa-solid fa-lock"></i>
              <input type="password" id="newPassword" placeholder="Min 8 characters" required />
            </div>
          </div>
          <div class="form-group">
            <label for="confirmPassword">Confirm Password</label>
            <div class="input-with-icon">
              <i class="fa-solid fa-lock"></i>
              <input type="password" id="confirmPassword" placeholder="Repeat password" required />
            </div>
          </div>
          <div id="updateError" class="error-message"></div>
          <div id="updateSuccess" class="success-message"></div>
          <button type="submit" class="admin-btn" id="updateBtn">
            Set New Password <i class="fa-solid fa-arrow-right"></i>
          </button>
        </form>

        <div class="back-link">
          <a href="/"><i class="fa-solid fa-arrow-left" style="font-size: 0.75rem"></i> Back to Login</a>
        </div>
      </div>
    </div>
    
<script>
  // Initialize Supabase
  const SUPABASE_URL = "https://azdhqelzwptdyjypjkcb.supabase.co";
  const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImF6ZGhxZWx6d3B0ZHlqeXBqa2NiIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzYwNjQwODEsImV4cCI6MjA5MTY0MDA4MX0.g6YLwLhe_pG_27FQlKgwlrDDlsqeory5s5HWSTe3nKA"; // Put your real key here!
  const sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

  let recoveryToken = "";

  function showUpdateForm() {
    console.log("✅ Token found! Switching to the new password form...");
    document.getElementById("requestForm").style.display = "none";
    document.getElementById("updateForm").style.display = "block";
    document.getElementById("pageTitle").textContent = "Set New Password";
    document.getElementById("pageSubtitle").textContent = "Choose a strong password";
  }

  // WAIT for the page to fully load before checking the URL
  window.addEventListener('DOMContentLoaded', () => {
    console.log("🔍 Checking URL for reset tokens...");
    
    // Check both Hash (#) and Query (?) parameters just to be safe
    const hashParams = new URLSearchParams(window.location.hash.substring(1));
    const queryParams = new URLSearchParams(window.location.search);
    
    const accessToken = hashParams.get('access_token') || queryParams.get('access_token');
    
    if (accessToken) {
      recoveryToken = accessToken; 
      showUpdateForm();
    } else {
      console.log("❌ No access token found in URL. Showing default email screen.");
    }
  });

  // Fallback listener for Supabase SDK
  sb.auth.onAuthStateChange((event, session) => {
    console.log("Supabase Auth Event:", event);
    if (event === "PASSWORD_RECOVERY" && session) {
      recoveryToken = session.access_token;
      showUpdateForm();
    }
  });

  async function sendResetEmail() {
    const email = document.getElementById("resetEmail").value.trim();
    const btn = document.getElementById("requestBtn");
    const err = document.getElementById("requestError");
    const ok = document.getElementById("requestSuccess");

    err.style.display = "none";
    ok.style.display = "none";

    btn.disabled = true;
    btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i> Sending...';

    // Make sure we tell Supabase to send them exactly back to this URL
    const { error } = await sb.auth.resetPasswordForEmail(email, {
      redirectTo: window.location.origin + window.location.pathname,
    });

    if (error) {
      err.textContent = error.message;
      err.style.display = "block";
      btn.disabled = false;
      btn.innerHTML = 'Send Reset Link <i class="fa-solid fa-paper-plane"></i>';
    } else {
      ok.textContent = "Reset link sent! Check your email (including spam).";
      ok.style.display = "block";
      btn.innerHTML = 'Sent <i class="fa-solid fa-check"></i>';
    }
  }

  async function updatePassword() {
    const pass = document.getElementById("newPassword").value;
    const confirm = document.getElementById("confirmPassword").value;
    const btn = document.getElementById("updateBtn");
    const err = document.getElementById("updateError");
    const ok = document.getElementById("updateSuccess");

    err.style.display = "none";
    ok.style.display = "none";

    if (pass.length < 8) {
      err.textContent = "Password must be at least 8 characters.";
      err.style.display = "block";
      return;
    }
    if (pass !== confirm) {
      err.textContent = "Passwords do not match.";
      err.style.display = "block";
      return;
    }
    if (!recoveryToken) {
      err.textContent = "Authentication missing. Please request a new reset link.";
      err.style.display = "block";
      return;
    }

    btn.disabled = true;
    btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i> Updating...';

try {
      // 1. Call your Edge Function to update the password
      const response = await fetch(`${SUPABASE_URL}/functions/v1/reset-password-admin`, {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'Authorization': `Bearer ${recoveryToken}`
        },
        body: JSON.stringify({ newPassword: pass })
      });

      const data = await response.json();

      if (!response.ok) throw new Error(data.error || "Failed to update password");

      ok.textContent = "Password updated! Redirecting to login...";
      ok.style.display = "block";
      btn.innerHTML = 'Done <i class="fa-solid fa-check"></i>';
      
      // 2. CRITICAL FIX: Destroy the temporary recovery session!
      // This forces the browser to forget the email link and guarantees a clean login.
      await sb.auth.signOut();
      
      // 3. Redirect back to login
      setTimeout(() => { window.location.href = "/"; }, 250000);

    } catch (error) {
      err.textContent = error.message;
      err.style.display = "block";
      btn.disabled = false;
      btn.innerHTML = 'Set New Password <i class="fa-solid fa-arrow-right"></i>';
    }
  }
</script>
  </body>
</html>
